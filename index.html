<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#38bdf8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <title>LinguaVoice v5.0 (Pro Edition)</title>
</head>

<body data-theme="midnight">
  <div id="app">
    <!-- Main Translation Section -->
    <div class="main-content">
      <div class="glass-card">
        <h1>LinguaVoice</h1>

        <!-- Theme Switcher -->
        <div class="theme-switcher">
          <div class="theme-opt midnight active" data-theme="midnight" title="Midnight"></div>
          <div class="theme-opt forest" data-theme="forest" title="Forest"></div>
          <div class="theme-opt arctic" data-theme="arctic" title="Arctic"></div>
          <div class="theme-opt obsidian" data-theme="obsidian" title="Obsidian"></div>
        </div>

        <!-- Audio Visualizer -->
        <div class="visualizer-container">
          <canvas id="visualizer"></canvas>
        </div>

        <div class="controls">
          <div class="toggle-container">
            <span id="label-en" class="lang-label active">English</span>
            <label class="switch">
              <input type="checkbox" id="lang-toggle">
              <span class="slider"></span>
            </label>
            <span id="label-fi" class="lang-label">Finnish</span>
          </div>

          <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-top: 1rem;">
            <label class="pro-toggle">
              <input type="checkbox" id="auto-speak-toggle" checked> Auto-Speak
            </label>
            <label class="pro-toggle">
              <input type="checkbox" id="auto-detect-toggle"> Auto-Detect
            </label>
            <label class="pro-toggle pro-only">
              <input type="checkbox" id="tone-toggle"> Puhekieli (Spoken)
            </label>
          </div>
        </div>

        <div class="display-area">
          <div class="text-box">
            <div class="header-row">
              <div class="label">Original</div>
              <div class="actions">
                <button id="copy-orig" class="action-btn" title="Copy text">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
                <button id="play-orig" class="action-btn" title="Play original">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  </svg>
                </button>
              </div>
            </div>
            <div id="original-text" class="content" data-placeholder="Speak to see text..."></div>
          </div>

          <div id="trans-box" class="text-box">
            <div class="header-row">
              <div class="label">Translation</div>
              <div class="actions">
                <button id="speak-btn" class="action-btn" title="Listen to translation">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                  </svg>
                </button>
                <button id="download-btn" class="action-btn" title="Download audio">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                </button>
                <button id="copy-trans" class="action-btn" title="Copy translation">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
                <button id="star-btn" class="action-btn" title="Add to favorites">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon
                      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                    </polygon>
                  </svg>
                </button>
                <button id="share-img-btn" class="action-btn pro-only" title="Share as Image">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                </button>
              </div>
            </div>
            <div id="translated-text" class="content" data-placeholder="Translation will appear here..."></div>
            <div id="phonetic-text" class="phonetic"></div>
            <div id="grammar-hint" class="grammar-hint"></div>
          </div>
        </div>

        <div class="pro-actions">
          <button id="ocr-btn" class="pro-btn" title="Translate from Image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
            Scan Image
          </button>
          <button id="conv-btn" class="pro-btn pro-only" title="Conversation Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 6.1H3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-10a2 2 0 0 0-2-2zM4.5 11h3M4.5 15h10">
              </path>
              <path d="M23 4v12"></path>
            </svg>
            Conversation
          </button>
          <button id="vision-btn" class="pro-btn pro-only" title="Live Vision Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
            Live Vision
          </button>
          <button id="learn-btn" class="pro-btn" title="Learning Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Study Space
          </button>
        </div>

        <div class="button-container">
          <button id="listen-btn" class="listen-btn">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
            <span id="btn-text">Start Listening</span>
          </button>
          <div class="keyboard-hint">
            Press <kbd>Space</kbd> to record | <kbd>Ctrl+C</kbd> to copy
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar Section -->
    <div class="sidebar">
      <!-- Pro Analytics -->
      <div class="section-card pro-card">
        <div class="section-title">PRO ANALYTICS</div>
        <div class="progress-stats">
          <div class="stat-circle">
            <svg viewBox="0 0 36 36" class="circular-chart">
              <path class="circle-bg"
                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
              <path class="circle" id="progress-val" stroke-dasharray="0, 100"
                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            </svg>
            <div class="percentage" id="daily-count">0</div>
          </div>
          <div class="stat-text">Daily Phrases</div>
        </div>
        <canvas id="analytics-chart" height="120"></canvas>
      </div>

      <!-- Favorites -->
      <div class="section-card">
        <div class="section-title">
          FAVORITES
          <svg style="width:16px; height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
            </polygon>
          </svg>
        </div>
        <div id="favorites-list" class="favorites-list"></div>
      </div>

      <!-- Recent -->
      <div class="section-card">
        <div class="section-title">
          HISTORY
          <button id="export-btn" class="action-btn" title="Export as TXT" style="padding:0">
            <svg style="width:14px; height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Text copied to clipboard!</div>

  <!-- Live Subtitles -->
  <div id="subtitle-overlay" class="subtitle-overlay">
    <div id="subtitle-content" class="subtitle-text"></div>
  </div>

  <!-- Pro Modals -->
  <div id="pro-modal" class="modal-overlay">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h2 id="modal-title">Pro Feature</h2>
        <button class="close-modal" id="close-modal">&times;</button>
      </div>
      <div id="modal-body" class="modal-body">
        <!-- Dynamic Content -->
      </div>
    </div>
  </div>

  <input type="file" id="ocr-upload" style="display: none;" accept="image/*">

  <script type="module" src="/src/main.js"></script>
</body>

</html>
